name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds the portable Windows exe and attaches it to a GitHub Release.

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # required to create the Release and upload assets

jobs:
  release:
    name: build + publish Windows exe
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Test (engine)
        run: go test ./internal/scan/ ./internal/monitor/ ./internal/netutil/ ./internal/model/ ./internal/profile/ ./internal/mailer/

      - name: Build portable Windows exe
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-H windowsgui -s -w" -o dist/NetWatch.exe .
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/NetWatch.exe \
            --title "NetWatch ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes "Portable Windows LAN scanner & monitor. Download **NetWatch.exe** and double-click — no installer, no runtime, no admin rights."
