name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-test:
    name: vet · test · cross-build
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: go vet (windows target, whole module incl. GUI)
        run: go vet ./...
        env:
          GOOS: windows
          GOARCH: amd64

      - name: Unit + integration tests (OS-independent engine)
        run: go test ./internal/scan/ ./internal/monitor/ ./internal/netutil/ ./internal/model/ ./internal/profile/ ./internal/mailer/

      - name: Cross-compile Windows exe (smoke)
        run: go build -trimpath -ldflags "-H windowsgui -s -w" -o /tmp/NetWatch.exe .
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
